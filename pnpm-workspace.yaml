allowBuilds:
  esbuild: true
  unrs-resolver: true

minimumReleaseAge: 10080 # = 7 days

minimumReleaseAgeExclude:
  - '@types/**'
  - ts-type-forge
  - ts-data-forge
  - ts-fortress
  - ts-repo-utils
  - ts-codemod-lib
  - synstate
  - 'synstate-*'
  - eslint-config-typed
  - eslint-plugin-ts-data-forge
  - octokit-safe-types
  - github-settings-as-code

packages:
  - 'packages/scripts-common'
  - 'packages/v*'
  - 'packages/v*/output'
  - 'packages/v*/output-branded'
