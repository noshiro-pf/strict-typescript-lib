name: Node.js Version Compatibility

on:
  push:
    branches-ignore:
      - 'develop'
      - 'develop*'
    paths-ignore:
      - '.gitignore'

  workflow_dispatch:

jobs:
  test-node-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.18.0', '22.22.2', '24.14.1', '25.9.0']

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch main
        run: git fetch origin main # To allow check-should-run-type-checks to get the diff from main

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --engine-strict

      # NOTE: To include this workflow in the branch protection rule status check,
      # skip each step instead of skipping the entire workflow with paths-ignore.
      - name: Check diff
        id: check_diff_type
        run: pnpm exec check-should-run-type-checks

      - name: Verify installation
        if: steps.check_diff_type.outputs.should_run == 'true'
        run: pnpm list

      - name: Build
        if: steps.check_diff_type.outputs.should_run == 'true'
        run: pnpm run build

      - name: Test
        if: steps.check_diff_type.outputs.should_run == 'true'
        run: pnpm run test
