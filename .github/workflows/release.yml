name: Release

on:
  push:
    branches:
      - main

env:
  CI: true

jobs:
  release:
    name: Release
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write # to create release
      issues: write # to post issue comments
      pull-requests: write # to create pull request
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          # Public, unscoped packages are published to the npm public registry.
          registry-url: https://registry.npmjs.org/
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.CHANGESETS_BOT_APP_ID }}
          private-key: ${{ secrets.CHANGESETS_BOT_PRIVATE_KEY }}

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          publish: pnpm run changeset:publish
          version: pnpm run changeset:version-packages
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          # GitHub App token: used by changesets to open the release PR.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # npm automation token (bypasses 2FA): used by `npm publish`. The
          # authToken line written by setup-node expands NODE_AUTH_TOKEN at
          # publish time, so publish-packages.mts authenticates with this.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
