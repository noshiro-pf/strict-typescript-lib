# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates
# https://docs.github.com/ja/code-security/dependabot/working-with-dependabot/keeping-your-actions-up-to-date-with-dependabot

version: 2
updates:
  - package-ecosystem: 'npm' # See documentation for possible values
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    target-branch: 'main'
    commit-message:
      prefix: 'fix'
      prefix-development: 'chore'
    ignore:
      # "typescript" must stay on 6.x: TypeScript 7 no longer ships the JS compiler
      # API required by typescript-eslint, typedoc, and
      # prettier-plugin-organize-imports.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    cooldown:
      default-days: 7
    target-branch: 'main'
    commit-message:
      prefix: 'chore'
      include: 'scope'
